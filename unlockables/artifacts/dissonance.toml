[text.en]
name = "Dissonance"
summary = "Find 4 hidden Artifact Shards to unlock Artifact of Dissonance."
location = "Sight-Seeing"
steps = [
  "Collect the shard in Ancient Valley variants #4-#6: it is on the right side of the central mountain and can be reached by a hidden chain or rope at the top of the mountain.",
  "Collect the shard in Sunken Tombs Stage Variant #5.",
  "Collect the shard in Magma Barracks variants #4-#6: the cached wiki note places it near the top-right of the map on Stage Variant #6.",
  "Collect the shard in Hive Cluster variants #1-#3: the cached wiki note points to the Bloated Survivor in the bottom-right of Stage Variant #1.",
  "After 4 total Artifact Shards are collected, Artifact of Dissonance unlocks."
]
notes = [ ]

[text.zh-Hans]
name = "纷争"
summary = "找到 4 个隐藏的<神器碎片>以解锁<神器：纷争>。"
location = "观光"
steps = [
  "收集<远古峡谷>变体 #4-#6 的碎片：它位于中央山体右侧，可通过山顶隐藏的锁链或绳索抵达。",
  "收集<沉没墓园>关卡变体 #5 的碎片。",
  "收集<熔岩要塞>变体 #4-#6 的碎片：缓存的 wiki 注记指出它在关卡变体 #6 地图右上方附近。",
  "收集<虫巢>变体 #1-#3 的碎片：缓存的 wiki 注记指向关卡变体 #1 右下角的<膨胀幸存者>。",
  "总计收集 4 个<神器碎片>后，<神器：纷争>会解锁。"
]
