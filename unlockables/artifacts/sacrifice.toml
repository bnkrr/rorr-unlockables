[text.zh-Hans]
summary = "射击<{{stage.magmaBarracks}}>中藏在墙后的三个按钮，以解锁<神器：{{artifact.sacrifice}}>。"
location = "核心附近"
steps = [
  "使用任意规则集进入<{{stage.magmaBarracks}}>关卡变体 #1、#2 或 #3。",
  "在整个关卡中搜索藏在墙后的三个按钮。",
  "射击全部三个隐藏按钮。<{{monster.evolvedLemurian}}>也能击中按钮，可帮助无法穿墙攻击的角色。",
  "按钮目标完成后，拾取<神器：{{artifact.sacrifice}}>。"
]
