[[additional]]
en = "Known game issue in version 1.1: the runtime links Spirit to the Strange Prism: Calcium Achievement instead of Beneath the Temple. Collecting Spirit may therefore unlock the Calcium skin and make Spirit available in the loadout, while Beneath the Temple remains incomplete in both the in-game Challenge list and Steam. This behavior is supported by runtime inspection and observed save state. This note is informational; progress here always follows Beneath the Temple."
zh-Hans = "游戏 1.1 版本存在已知问题：运行时把精神神器错误关联到了“奇怪棱镜：钙”成就，而不是“神庙之下”。因此，拾取精神神器可能会错误解锁“钙”皮肤并使精神神器可用于配置，但游戏内挑战列表和 Steam 中的“神庙之下”仍未完成。运行时检查和实际存档状态均支持这一现象。本说明仅供参考；此处的进度始终以“神庙之下”为准。"

