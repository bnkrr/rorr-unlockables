[text.en]
summary = "Find and inspect the Bloated Survivor corpse in {{stage.hiveCluster}} variants #1-#3 to unlock {{item.deadMansFoot}}."
steps = [
  "Route into {{stage.hiveCluster}} Stage Variant #1, #2, or #3.",
  "On Stage Variant #1, go to the bottom-right area. On #2 or #3, search the right side from the midpoint downward; their exact routes still need confirmation.",
  "Clear nearby enemies before interacting with the corpse near a wall.",
  "Walk over the corpse until the Inspect prompt appears, then interact and be ready for attacks from {{monster.archerBug}}."
]
notes = [ "The unlock completes the Last Wish achievement and unlocks {{item.deadMansFoot}}." ]

[text.zh-Hans]
summary = "在<{{stage.hiveCluster}}>变体 #1-#3 找到并调查<膨胀幸存者>尸体，以解锁<{{item.deadMansFoot}}>。"
steps = [
  "进入<{{stage.hiveCluster}}>关卡变体 #1、#2 或 #3。",
  "变体 #1 前往地图右下角；变体 #2/#3 从地图右侧中部向下搜索，其精确路线仍待确认。",
  "接近靠墙的尸体前，先清理附近敌人。",
  "从尸体上方经过，出现“调查”提示后交互，并准备应对随后出现的<{{monster.archerBug}}>。"
]
notes = [ "完成后会达成<遗愿>挑战/成就，并解锁<{{item.deadMansFoot}}>。" ]

