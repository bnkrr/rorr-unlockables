# Human-readable schema reference for metadata/entities/*.toml.
# Each file owns one entity type; file name supplies the type prefix.

schema_version = 1

[example]
icon = "icons/example.png"
owner = "survivor.example" # Optional; used by skills, skins, and trials.
url = "https://example.com" # Optional canonical external reference.
tier = "common" # Required for items; the sync program updates it from the game registry.

[example.name]
en = "Example"
zh-Hans = "Example"

# Nested keys represent a dot-separated entity ID. For example, the key
# skill.acrid.acridC2 is stored as [acrid.acridC2] in skills.toml.
# Stable facts extracted from the live game registry are stored directly with
# each entity. The parent rorr_progress project owns the sync program.

[example.game]
game_id = "ror:example"
content_class = "item"
achievement_id = "unlock_example"
progress_needed = 1
